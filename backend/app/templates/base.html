<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ArmariumLabs{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">ArmariumLabs</a>
    <div class="topbar-actions">
      {% if request.session.get("user") %}
      <span class="user">{{ request.session.get("user") }}</span>
      <form action="/logout" method="post">
        <button class="button secondary" type="submit">Burg verlassen</button>
      </form>
      {% endif %}
    </div>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
